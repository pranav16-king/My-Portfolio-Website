<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌐 Code Notes Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/notes_section/style1.css">
   
  </head>

  <body
    class="dark-theme text-gray-100 min-h-screen transition-all duration-700"
    id="themeBody"
  >
    <!-- Navbar -->
    <header
      class="flex justify-between items-center px-8 py-5 border-b border-cyan-400/40 bg-gray-900/60 backdrop-blur-lg transition-all duration-700"
      id="navbar"
    >
      <h1
        class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent"
      >
        💻 Pranav Notes Hub
      </h1>
      <nav class="flex items-center space-x-6 text-lg">
        <a
          href="/index.html"
          id="homeLink"
          class="hover:text-cyan-300 transition-all duration-300"
          >🏠 Home</a
        >
        <a
          href="/index.html"
          id="homeLink"
          class="hover:text-cyan-300 transition-all duration-300"
          >🏆 Achievements</a
        >
        <button
          id="toggle-theme"
          class="px-4 py-2 rounded-xl bg-gradient-to-r from-cyan-500 to-purple-600 glow text-white font-semibold transition-all duration-300"
        >
          🌙 Dark Mode
        </button>
      </nav>
    </header>

    <!-- Search Section -->
    <section
      class="flex flex-col items-center justify-center mt-16 fade-up transition-all duration-700"
    >
      <h2 class="text-4xl font-semibold mb-6 text-black">
        Find Your Notes 📚
      </h2>
      <div
        class="relative flex items-center border-2 border-cyan-400 rounded-full px-8 py-4 w-[700px] max-w-[90%] glow transition-all duration-500"
      >
        <span class="text-2xl text-cyan-300 mr-3">🔍</span>
        <input
          type="text"
          id="searchBox"
          placeholder="Search programming languages..."
          class="w-full bg-transparent outline-none text-lg text-gray-200 placeholder-gray-400"
        />
      </div>
    </section>
<!-- Notes Container -->
<section
  id="notesContainer"
  class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 px-10 py-16 fade-up transition-all duration-700"
></section>




    <!-- Footer -->
    <footer
      class="text-center py-6 border-t border-gray-700 mt-10 bg-gray-900/60 backdrop-blur-lg transition-all duration-700"
      id="footer"
    >
      <p class="text-gray-400">
        © 2025 Code Notes Hub | Designed with 💙 by Pranav 🚀
      </p>
    </footer>

  
  </body>
  <script src="/notes_section/script1.js"></script>
</html>
