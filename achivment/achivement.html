<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Achievements</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
    }
  </style>
</head>

<body class="bg-gray-900 text-gray-100 font-sans">

  <!-- Header -->
  <header class="bg-gradient-to-r from-blue-600 to-purple-600 py-3 shadow-lg sticky top-0 z-50">
    <div class="container mx-auto flex justify-between items-center px-4">
      <h1 class="text-2xl font-bold text-white">Compition particpation, Achievements & Projects</h1>
      <nav class="space-x-3">
        <a href="/index.html" class="text-white px-3 py-1 rounded hover:bg-white hover:text-gray-900 transition">Home</a>
        <a href="/notes_section/notes.html"
          class="text-white px-3 py-1 rounded hover:bg-white hover:text-gray-900 transition">Coding Notes</a>
      </nav>
    </div>
  </header>
  <!-- Projects & Achievements Section -->
  <section class="py-12 relative" x-data="achievementSlider()" x-init="startAutoSlide()">
    <h2 class="text-3xl font-bold mb-8 text-indigo-400 text-center">Compition particpation, Achievements & Projects</h2>

    <template x-for="(achievement, index) in achievements" :key="index">
      <div x-show="current === index" x-transition.opacity.duration.500ms
        class="flex flex-col lg:flex-row gap-6 items-stretch justify-center px-4">

        <!-- Left: Competition & Team -->
        <div class="lg:w-1/2 bg-gray-800 p-6 rounded-xl shadow-lg flex flex-col justify-between">
          <div>
            <h3 class="text-2xl font-semibold mb-3 text-indigo-400" x-text="achievement.title"></h3>
            <p class="text-gray-300 mb-3" x-html="achievement.description"></p>

            <div class="text-gray-400 text-sm space-y-1 mb-4">
              <template x-for="line in achievement.details" :key="line">
                <p x-html="line"></p>
              </template>
            </div>

            <!-- Team Members -->
            <div class="mt-4">
              <p class="font-semibold text-gray-200 mb-2">👥 Team Members:</p>
              <div class="grid grid-cols-3 gap-4">
                <template x-for="member in achievement.team" :key="member.name">
                  <div class="bg-gray-900 p-2 rounded-lg text-center shadow-lg">
                    <img :src="member.photo" class="w-24 h-24 mx-auto rounded-full object-cover mb-1">
                    <h4 class="text-sm font-semibold" x-text="member.name"></h4>
                    <p class="text-xs text-gray-400" x-text="member.role"></p>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <!-- View & Download Certificate -->
          <div class="mt-6 flex justify-center gap-4">
            <a href="#" class="bg-indigo-500 px-4 py-2 rounded hover:bg-indigo-600 transition">View Certificate</a>
            <a href="#" class="bg-green-500 px-4 py-2 rounded hover:bg-green-600 transition">Download Certificate</a>
          </div>
        </div>

        <!-- Right: Image Slider (Fixed 1200x1600 frame) -->
        <div x-data="imageSlider(achievement.images)" class="lg:w-1/2 relative flex justify-center items-center">
          <template x-for="(slide, idx) in slides" :key="idx">
            <div x-show="currentImage === idx"
              class="w-[620px] h-[640px] max-w-full max-h-full rounded-xl shadow-lg overflow-hidden flex items-center justify-center bg-gray-900">
              <img :src="slide" class="w-full h-full object-contain" alt="Project Image">
            </div>

          </template>

          <!-- Slider Buttons -->
          <button @click="prevImage()"
            class="absolute left-2 top-1/3 transform -translate-y-1/2 bg-indigo-500 bg-opacity-60 text-white p-3 rounded-full hover:bg-opacity-90 z-20">&#10094;</button>
          <button @click="nextImage()"
            class="absolute right-2 top-1/3 transform -translate-y-1/2 bg-indigo-500 bg-opacity-60 text-white p-3 rounded-full hover:bg-opacity-90 z-20">&#10095;</button>
        </div>
      </div>
    </template>

    <!-- Achievements Navigation -->
    <button @click="prevAchievement()"
      class="absolute left-0 top-1/2 transform -translate-y-1/2 bg-indigo-500 bg-opacity-50 text-white p-3 rounded-full hover:bg-opacity-90 z-10">&#10094;</button>
    <button @click="nextAchievement()"
      class="absolute right-0 top-1/2 transform -translate-y-1/2 bg-indigo-500 bg-opacity-50 text-white p-3 rounded-full hover:bg-opacity-90 z-10">&#10095;</button>
  </section>


  <!-- Certifications Section -->
  <section class="bg-gray-800 py-12">
    <div class="container mx-auto px-4">
      <h2 class="text-3xl font-bold mb-6 text-indigo-400 text-center">Certifications</h2>
      <div x-data="imageSlider([
            'img/cer.png',
            'img/cer1.png',
            'img/oracle ai.png',
            'img/cer2.png',
            'img/cer3.png',
            'img/cer4.png',
            'img/oracle cloud.png',
            'img/cer5.png'
          ])" class="relative w-full max-w-3xl mx-auto">
        <template x-for="(image, index) in slides" :key="index">
          <div x-show="currentImage === index" class="rounded-xl overflow-hidden shadow-lg transition duration-500">
            <img :src="image" class="w-auto max-w-full h-auto rounded-xl" />
          </div>
        </template>

        <button @click="prevImage()"
          class="absolute left-0 top-1/3 transform -translate-y-1/2 bg-indigo-500 bg-opacity-60 text-white p-3 rounded-full hover:bg-opacity-90 z-20">&#10094;</button>
        <button @click="nextImage()"
          class="absolute right-0 top-1/3 transform -translate-y-1/2 bg-indigo-500 bg-opacity-60 text-white p-3 rounded-full hover:bg-opacity-90 z-20">&#10095;</button>
      </div>
    </div>
  </section>



</body>
<script src="achivment.js"></script>
</html>
